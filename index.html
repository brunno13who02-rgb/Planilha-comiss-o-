<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Açaí Pro | Dashboard Premium</title>

<style>
:root {
    --primary: #a78bfa;
    --accent: #7c3aed;
    --bg: #0f172a;
    --card-bg: rgba(30, 41, 59, 0.7);
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --success: #10b981;
    --danger: #ef4444;
    --glass-border: rgba(255,255,255,0.1);
}

*{
    box-sizing:border-box;
    transition:0.3s;
}

body{
    margin:0;
    font-family:Inter,sans-serif;
    background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
    color:white;
}

header{
    display:flex;
    gap:10px;
    padding:10px;
    background:rgba(15,23,42,.8);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:100;
    border-bottom:1px solid var(--glass-border);
}

header button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:transparent;
    color:var(--text-dim);
    cursor:pointer;
    font-weight:bold;
}

header button.active{
    background:var(--accent);
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card{
    background:var(--card-bg);
    border:1px solid var(--glass-border);
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
    backdrop-filter:blur(15px);
}

.grid-inputs{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin:15px 0;
}

input,select{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,.05);
    color:white;
    border:1px solid var(--glass-border);
}

.btn-p{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,var(--accent),#4f46e5);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.btn-del{
    background:rgba(239,68,68,.1);
    border:1px solid rgba(239,68,68,.2);
    color:var(--danger);
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 8px;
}

th{
    text-align:left;
    color:var(--text-dim);
    font-size:.8rem;
    padding:12px;
}

td{
    padding:14px 12px;
    background:rgba(255,255,255,.03);
}

td:first-child{
    border-radius:12px 0 0 12px;
}

td:last-child{
    border-radius:0 12px 12px 0;
}

.total-destaque{
    font-size:2rem;
    font-weight:800;
    text-align:right;
    color:var(--success);
}

.resumo-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.resumo-box{
    padding:25px;
    border-radius:20px;
    text-align:center;
    background:rgba(255,255,255,.03);
    border:1px solid var(--glass-border);
}

.resumo-box strong{
    display:block;
    margin-top:10px;
    font-size:2rem;
}

.rel-tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.rel-tabs button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:rgba(255,255,255,.05);
    color:white;
}

.rel-tabs button.active{
    background:var(--accent);
}
</style>
</head>

<body>

<header>
    <button onclick="aba('estoque', this)" class="active">📦 Estoque</button>
    <button onclick="aba('ficha', this)">🧪 Ficha Técnica</button>
    <button onclick="aba('financeiro', this)">💰 Finanças</button>
    <button onclick="aba('relatorio', this)">📊 Relatório</button>
</header>

<div class="container">

<div id="estoque" class="aba-content">

<div class="card">
<h3>Cadastrar Novo Insumo</h3>

<div class="grid-inputs">
<input id="est-nome" type="text" placeholder="Nome do Produto">
<input id="est-preco" type="number" placeholder="Valor Pago">
<input id="est-qtd" type="number" placeholder="Quantidade">
</div>

<button class="btn-p" onclick="addEstoque()">Adicionar</button>
</div>

<div class="card">
<h3>Itens em Estoque</h3>
<table id="tab-estoque"></table>
</div>

</div>

<div id="ficha" class="aba-content" style="display:none">

<div class="card">
<h3>Calculadora de Montagem</h3>

<div class="grid-inputs">
<select id="sel-insumo"></select>
<input id="ficha-qtd" type="number" placeholder="Quantidade">
<button class="btn-p" onclick="addNaMontagem()">Adicionar</button>
</div>

<table id="tab-ficha"></table>

<div class="total-destaque">
R$ <span id="custo-total">0.00</span>
</div>

<button class="btn-p" onclick="limparFicha()">
Limpar Ficha
</button>

</div>
</div>

<div id="financeiro" class="aba-content" style="display:none">

<div class="card">

<h3>Lançar Movimentação</h3>

<select id="fin-tipo" onchange="toggleFinanceiro()">

<option value="vendas">🟢 Venda</option>
<option value="despesas">🔴 Despesa</option>

</select>

<div id="campos-venda">

<div class="grid-inputs">
<input id="fin-cliente" type="text" placeholder="Nome do Comprador">
<input id="fin-desc" type="text" placeholder="Descrição">
<input id="fin-qtd" type="number" placeholder="Quantidade">
<input id="fin-val" type="number" placeholder="Valor">
</div>

</div>

<div id="campos-despesa" style="display:none">

<div class="grid-inputs">
<input id="desp-desc" type="text" placeholder="Descrição">
<input id="desp-val" type="number" placeholder="Valor">
</div>

</div>

<button class="btn-p" onclick="addFinanceiro()">
Salvar
</button>

</div>

</div>

<div id="relatorio" class="aba-content" style="display:none">

<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
<h3 style="margin:0">Balanço Mensal</h3>

<input type="month" id="filtro-mes" onchange="render()">
</div>

<div class="resumo-grid">

<div class="resumo-box">
<span>Faturamento</span>
<strong id="res-v" style="color:var(--success)">R$ 0</strong>
</div>

<div class="resumo-box">
<span>Despesas</span>
<strong id="res-d" style="color:var(--danger)">R$ 0</strong>
</div>

<div class="resumo-box">
<span>Lucro</span>
<strong id="res-l">R$ 0</strong>
</div>

</div>

</div>

<div class="card">

<div class="rel-tabs">
<button class="active" id="btn-tab-vendas" onclick="trocarRelatorio('vendas')">🟢 Vendas</button>
<button id="btn-tab-despesas" onclick="trocarRelatorio('despesas')">🔴 Despesas</button>
</div>

<div id="rel-vendas">
<table id="tab-vendas"></table>
</div>

<div id="rel-despesas" style="display:none">
<table id="tab-despesas"></table>
</div>

</div>

</div>

</div>

<script>

let db = JSON.parse(localStorage.getItem('acai_master')) || {
    estoque:[],
    vendas:[],
    despesas:[]
};

let montagem = [];

function save(){
    localStorage.setItem('acai_master', JSON.stringify(db));
    render();
}

function aba(id, btn){

    document.querySelectorAll('.aba-content').forEach(x=>{
        x.style.display='none';
    });

    document.getElementById(id).style.display='block';

    document.querySelectorAll('header button').forEach(b=>{
        b.classList.remove('active');
    });

    btn.classList.add('active');
}

function toggleFinanceiro(){

    const tipo = document.getElementById('fin-tipo').value;

    document.getElementById('campos-venda').style.display =
        tipo === 'vendas' ? 'block' : 'none';

    document.getElementById('campos-despesa').style.display =
        tipo === 'despesas' ? 'block' : 'none';
}

function addEstoque(){

    const n = document.getElementById('est-nome').value;
    const p = parseFloat(document.getElementById('est-preco').value);
    const q = parseFloat(document.getElementById('est-qtd').value);

    if(!n || isNaN(p) || isNaN(q)){
        return alert('Preencha tudo');
    }

    db.estoque.push({
        id:Date.now(),
        n,
        custoUnit:p/q
    });

    save();

    document.getElementById('est-nome').value='';
    document.getElementById('est-preco').value='';
    document.getElementById('est-qtd').value='';
}

function addNaMontagem(){

    const id = document.getElementById('sel-insumo').value;
    const q = parseFloat(document.getElementById('ficha-qtd').value);

    const insumo = db.estoque.find(x=>x.id == id);

    if(!insumo || !q) return;

    montagem.push({
        n:insumo.n,
        q,
        sub:insumo.custoUnit * q
    });

    renderFicha();
}

function renderFicha(){

    const t = document.getElementById('tab-ficha');

    t.innerHTML = `
    <tr>
        <th>Ingrediente</th>
        <th>Qtd</th>
        <th>Custo</th>
    </tr>`;

    let total = 0;

    montagem.forEach(m=>{

        total += m.sub;

        t.innerHTML += `
        <tr>
            <td>${m.n}</td>
            <td>${m.q}</td>
            <td>R$ ${m.sub.toFixed(2)}</td>
        </tr>`;
    });

    document.getElementById('custo-total').innerText =
        total.toFixed(2);
}

function limparFicha(){
    montagem=[];
    renderFicha();
}

function addFinanceiro(){

    const tipo = document.getElementById('fin-tipo').value;
    const mes = document.getElementById('filtro-mes').value;

    if(tipo === 'vendas'){

        const cliente =
            document.getElementById('fin-cliente').value;

        const desc =
            document.getElementById('fin-desc').value;

        const qtd =
            parseFloat(document.getElementById('fin-qtd').value);

        const val =
            parseFloat(document.getElementById('fin-val').value);

        if(!cliente || !desc || isNaN(qtd) || isNaN(val)){
            return alert('Preencha todos os campos');
        }

        db.vendas.push({
            id:Date.now(),
            cliente,
            desc,
            qtd,
            total:val,
            mes
        });

    } else {

        const desc =
            document.getElementById('desp-desc').value;

        const val =
            parseFloat(document.getElementById('desp-val').value);

        if(!desc || isNaN(val)){
            return alert('Preencha os campos');
        }

        db.despesas.push({
            id:Date.now(),
            desc,
            total:val,
            mes
        });
    }

    save();

    alert('Salvo com sucesso');
}

function trocarRelatorio(tipo){

    document.getElementById('rel-vendas').style.display =
        tipo === 'vendas' ? 'block' : 'none';

    document.getElementById('rel-despesas').style.display =
        tipo === 'despesas' ? 'block' : 'none';

    document.getElementById('btn-tab-vendas')
        .classList.remove('active');

    document.getElementById('btn-tab-despesas')
        .classList.remove('active');

    if(tipo === 'vendas'){
        document.getElementById('btn-tab-vendas')
            .classList.add('active');
    } else {
        document.getElementById('btn-tab-despesas')
            .classList.add('active');
    }
}

function render(){

    const mes = document.getElementById('filtro-mes').value;

    const te = document.getElementById('tab-estoque');
    const sel = document.getElementById('sel-insumo');

    te.innerHTML = `
    <tr>
        <th>Produto</th>
        <th>Custo Unit.</th>
        <th>Ação</th>
    </tr>`;

    sel.innerHTML =
        `<option value="">Selecionar</option>`;

    db.estoque.forEach(i=>{

        te.innerHTML += `
        <tr>
            <td>${i.n}</td>
            <td>R$ ${i.custoUnit.toFixed(4)}</td>
            <td>
                <button class="btn-del"
                onclick="db.estoque=db.estoque.filter(x=>x.id!=${i.id});save()">
                Excluir
                </button>
            </td>
        </tr>`;

        sel.innerHTML += `
        <option value="${i.id}">
        ${i.n}
        </option>`;
    });

    const vendas =
        db.vendas.filter(x=>x.mes === mes);

    const despesas =
        db.despesas.filter(x=>x.mes === mes);

    const tv =
        vendas.reduce((a,b)=>a+b.total,0);

    const td =
        despesas.reduce((a,b)=>a+b.total,0);

    document.getElementById('res-v').innerText =
        `R$ ${tv.toFixed(2)}`;

    document.getElementById('res-d').innerText =
        `R$ ${td.toFixed(2)}`;

    document.getElementById('res-l').innerText =
        `R$ ${(tv-td).toFixed(2)}`;

    const tabV =
        document.getElementById('tab-vendas');

    tabV.innerHTML = `
    <tr>
        <th>Comprador</th>
        <th>Descrição</th>
        <th>Qtd</th>
        <th>Valor</th>
    </tr>`;

    vendas.forEach(v=>{

        tabV.innerHTML += `
        <tr>
            <td>${v.cliente}</td>
            <td>${v.desc}</td>
            <td>${v.qtd}</td>
            <td style="color:var(--success)">
            R$ ${v.total.toFixed(2)}
            </td>
        </tr>`;
    });

    const tabD =
        document.getElementById('tab-despesas');

    tabD.innerHTML = `
    <tr>
        <th>Descrição</th>
        <th>Valor</th>
    </tr>`;

    despesas.forEach(d=>{

        tabD.innerHTML += `
        <tr>
            <td>${d.desc}</td>
            <td style="color:var(--danger)">
            R$ ${d.total.toFixed(2)}
            </td>
        </tr>`;
    });
}

document.getElementById('filtro-mes').value =
    new Date().toISOString().substring(0,7);

render();

</script>

</body>
</html>
